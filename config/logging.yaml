# =============================================================================
# Logging Configuration for AI GenAI Auto-Correction Pipeline
# =============================================================================
# Supports DEBUG, INFO, WARNING, ERROR, CRITICAL levels.
# Log level can be overridden via settings.yaml or LOG_LEVEL env variable.
# =============================================================================

version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"
  detailed:
    format: "%(asctime)s [%(levelname)s] %(name)s [%(filename)s:%(lineno)d]: %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"

handlers:
  console:
    class: logging.StreamHandler
    level: DEBUG
    formatter: standard
    stream: ext://sys.stdout
  file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: detailed
    filename: logs/pipeline.log
    maxBytes: 10485760
    backupCount: 5
    encoding: utf-8

loggers:
  autocorrection_pipeline:
    level: INFO
    handlers: [console, file]
    propagate: false

root:
  level: WARNING
  handlers: [console]
